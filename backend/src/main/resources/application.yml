spring:
  application:
    name: ai-interviewer

  # 로컬 개발 DB: Docker MySQL (결정사항 D34). `docker compose up -d` 후 실행.
  # 값은 docker-compose.yml 기본과 일치하며, 필요 시 환경변수(DB_URL/DB_USERNAME/DB_PASSWORD)로 덮는다.
  # (테스트는 src/test/resources/application.yml 의 H2를 사용 — MySQL/Docker 불필요)
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/aiinterviewer?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
    username: ${DB_USERNAME:aiinterviewer}
    password: ${DB_PASSWORD:aiinterviewer}

  jpa:
    hibernate:
      # 로컬 개발: 스키마 자동 반영(데이터 유지). 운영 전환 시 validate/none + 마이그레이션 도구.
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    show-sql: true
    open-in-view: false

# CORS 허용 오리진 (결정사항 D29) — 프론트가 백엔드를 직접 호출할 때. 쉼표로 여러 개 지정.
app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# 인증(JWT) 설정 (결정사항 D21)
# - secret: HS256 서명 키(최소 32바이트). 운영에서는 반드시 환경변수(JWT_SECRET)로 주입.
#   아래 기본값은 '개발 로컬 전용'이며 실제 비밀이 아니다(운영 커밋 금지 원칙 유지).
# - access-token-validity-seconds: 액세스 토큰 유효기간(초). 기본 1시간.
jwt:
  secret: ${JWT_SECRET:dev-local-jwt-secret-please-change-in-production-0123456789}
  access-token-validity-seconds: ${JWT_ACCESS_TOKEN_VALIDITY_SECONDS:3600}

# 소셜 로그인 설정 (Google — 결정사항 D38)
# - client-id: 구글 OAuth 클라이언트 ID. ID 토큰 검증의 대상(audience)으로 쓴다.
#   공개값이지만(프론트 번들에도 노출) 일관성을 위해 .env / 환경변수(GOOGLE_CLIENT_ID)로 주입.
#   비어 있으면 구글 로그인만 비활성(모든 토큰 거부)이고 앱은 정상 기동한다.
oauth:
  google:
    client-id: ${GOOGLE_CLIENT_ID:}

# LLM 연동 설정 (결정사항 D18)
# - 개발용 프로바이더: Google Gemini (gemini-2.5-flash, 무료 티어)
# - API 키는 절대 커밋 금지. .env / 환경변수(GEMINI_API_KEY)로만 주입.
llm:
  provider: gemini
  gemini:
    # 키는 backend/.env 의 GEMINI_API_KEY 로 주입(spring-dotenv). 없으면 빈 값 → LLM 호출만 비활성.
    api-key: ${GEMINI_API_KEY:}
    model: gemini-2.5-flash
    base-url: https://generativelanguage.googleapis.com/v1beta

logging:
  level:
    org.hibernate.SQL: debug
