# 테스트 전용 설정 — 테스트는 H2 인메모리로 격리 실행한다(Docker/MySQL 불필요).
# 이 파일이 클래스패스에서 main의 application.yml을 대체하므로, 빈 구성에 필요한 값을 자체 완결로 담는다.
spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false

# JwtProperties 바인딩용(테스트 전용 더미 키)
jwt:
  secret: test-only-jwt-secret-at-least-32-bytes-long-000000
  access-token-validity-seconds: 3600

# GeminiProperties 바인딩용(테스트에선 LlmClient를 Fake로 대체하므로 키는 비워둠)
llm:
  provider: gemini
  gemini:
    api-key: ${GEMINI_API_KEY:}
    model: gemini-2.5-flash
    base-url: https://generativelanguage.googleapis.com/v1beta

# CorsConfig 바인딩용
app:
  cors:
    allowed-origins: http://localhost:5173

logging:
  level:
    org.hibernate.SQL: warn
